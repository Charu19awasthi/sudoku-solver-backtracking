<!DOCTYPE html>
<html>
<head>
  <title>Sudoku Game</title>
  <script src="sudoku.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.5rem;
      letter-spacing: 2px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #00f2ff; }
      to { text-shadow: 0 0 20px #00f2ff, 0 0 30px #00f2ff; }
    }

    #container {
      margin-top: 20px;
    }

    table {
      border-collapse: collapse;
      margin: 20px auto;
      transform: scale(1);
      transition: transform 0.3s ease;
    }

    table:hover {
      transform: scale(1.03);
    }

    td {
      width: 55px;
      height: 55px;
      text-align: center;
      font-size: 1.5rem;
      border: 1px solid #555;
      cursor: pointer;
      background: rgba(255,255,255,0.05);
      transition: all 0.2s ease;
    }

    td:hover {
      background: rgba(0,255,255,0.2);
      transform: scale(1.1);
    }

    td:focus {
      outline: none;
      background: rgba(0,255,255,0.4);
    }

    /* Bold borders for 3x3 boxes */
    tr:nth-child(3n) td {
      border-bottom: 3px solid white;
    }

    td:nth-child(3n) {
      border-right: 3px solid white;
    }

    tr:nth-child(1) td {
      border-top: 3px solid white;
    }

    td:nth-child(1) {
      border-left: 3px solid white;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      font-size: 1.2rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    button:active {
      transform: scale(0.95);
    }

    #message {
      margin-top: 10px;
      font-size: 1.2rem;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<div id="container">

  <h1>🎮 Sudoku Solver</h1>

  <table id="sudoku-board">
  <tbody>
    <!-- Row 1 -->
    <tr>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
    </tr>

    <!-- Row 2 -->
    <tr>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
    </tr>

    <!-- Row 3 -->
    <tr>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
    </tr>

    <!-- Row 4 -->
    <tr>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
    </tr>

    <!-- Row 5 -->
    <tr>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
    </tr>

    <!-- Row 6 -->
    <tr>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
    </tr>

    <!-- Row 7 -->
    <tr>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
    </tr>

    <!-- Row 8 -->
    <tr>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
    </tr>

    <!-- Row 9 -->
    <tr>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
      <td contenteditable="true"></td><td contenteditable="true"></td><td contenteditable="true"></td>
    </tr>
  </tbody>
  </table>

<div>
  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>

  <button id="new-game">🎮 New Game</button>
  <button id="solve-button">⚡ Solve</button>
  <button id="hint-button">💡 Hint</button>
  <button id="clear-button">🧹 Clear</button>
</div>

<h3 id="timer">Time: 0s</h3>

<div id="leaderboard">
  <h3>Leaderboard</h3>
  <ul id="scores"></ul>
</div>

  <div id="message"></div>

</div>

<script>

  document.getElementById("sudoku-board").addEventListener("keyup", function(event) {
    if(event.target && event.target.nodeName == "TD") {
      let validNum = /[1-9]/;
      let td = event.target;

      if (td.innerText.length > 0 && validNum.test(td.innerText[0])) {
        td.innerText = td.innerText[0];
      } else {
        td.innerText = "";
      }
    }
  });

  document.getElementById("solve-button").addEventListener("click", function() {
    let boardString = boardToString();
    let solution = SudokuSolver.solve(boardString);

    if (solution) {
      animateSolution(solution);
      showMessage("✅ Solved Successfully!");
    } else {
      showMessage("❌ Invalid Board!");
    }
  });

  document.getElementById("clear-button").addEventListener("click", clearBoard);

  function showMessage(msg) {
    let el = document.getElementById("message");
    el.innerText = msg;
  }

  function clearBoard() {
    let tds = document.getElementsByTagName("td");
    for (let i = 0; i < tds.length; i++) {
      tds[i].innerText = "";
    }
    showMessage("Board Cleared 🧹");
  }

  function boardToString() {
    let str = "";
    let validNum = /[1-9]/;
    let tds = document.getElementsByTagName("td");

    for (let i = 0; i < tds.length; i++) {
      if (validNum.test(tds[i].innerText)) {
        str += tds[i].innerText;
      } else {
        str += "-";
      }
    }
    return str;
  }

  function animateSolution(solution) {
    let cells = solution.split("");
    let tds = document.getElementsByTagName("td");

    let i = 0;
    let interval = setInterval(() => {
      if (i >= tds.length) {
        clearInterval(interval);
        return;
      }
      tds[i].innerText = cells[i];
      tds[i].style.background = "#00ffcc33";
      i++;
    }, 20);
  }

</script>
<script src="js/solver.js"></script>
<script src="js/generator.js"></script>
<script src="js/hint.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/sound.js"></script>

</body>
</html>
